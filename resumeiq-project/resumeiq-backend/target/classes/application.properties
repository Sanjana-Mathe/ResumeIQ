# ── Server ──────────────────────────────────────────────
server.port=8080

# ── MySQL Database ───────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/resumeiq_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── JWT ──────────────────────────────────────────────────
# IMPORTANT: Change this to a strong random secret (at least 32 chars) in production
app.jwt.secret=ResumeIQ_SuperSecret_JWT_Key_2024_ChangeThis!
app.jwt.expiration-ms=86400000

# ── CORS ─────────────────────────────────────────────────
# "null" allows the HTML file to be opened directly from the filesystem (file://)
# Add your deployed frontend URL here for production
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,http://localhost:8000,null

# ── Anthropic AI ─────────────────────────────────────────
# REQUIRED: Replace with your actual Anthropic API key
app.anthropic.api-key=YOUR_ANTHROPIC_API_KEY
app.anthropic.model=claude-sonnet-4-20250514

# ── Logging ──────────────────────────────────────────────
logging.level.com.resumeiq=INFO
